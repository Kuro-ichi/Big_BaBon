services:
  rag-cli:
    build: .
    command: python chat_cli.py
    stdin_open: true
    tty: true
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://chatbot:chatbot@host.docker.internal:5432/chatbot_db}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: ${QDRANT_URL:?Set QDRANT_URL in .env}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: ${DOCKER_OLLAMA_URL:-http://host.docker.internal:11434}
      LLM_MODEL_LIGHT: ${LLM_MODEL_LIGHT:-qwen2.5:3b}
      LLM_MODEL_HEAVY: ${LLM_MODEL_HEAVY:-qwen2.5:3b}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-30}
      LLM_ROUTER_TIMEOUT: ${LLM_ROUTER_TIMEOUT:-8}
      LLM_ANSWER_TIMEOUT: ${LLM_ANSWER_TIMEOUT:-30}
      ROUTER_RISK_OVERRIDE_CONFIDENCE: ${ROUTER_RISK_OVERRIDE_CONFIDENCE:-0.65}
      WORKER_TASKS_ENABLED: ${WORKER_TASKS_ENABLED:-false}
      REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-1}
      REDIS_SOCKET_TIMEOUT: ${REDIS_SOCKET_TIMEOUT:-1}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-10}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-5}
      RETRIEVAL_CONTEXT_MAX_TOKENS: ${RETRIEVAL_CONTEXT_MAX_TOKENS:-2200}
      RETRIEVAL_MAX_DOCUMENTS: ${RETRIEVAL_MAX_DOCUMENTS:-8}
      RETRIEVAL_MIN_RERANK_SCORE: ${RETRIEVAL_MIN_RERANK_SCORE:--0.2}
      KEYWORD_SCROLL_MAX_POINTS: ${KEYWORD_SCROLL_MAX_POINTS:-2048}

      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag}
      QDRANT_MEMORY_COLLECTION: ${QDRANT_MEMORY_COLLECTION:-chat_store}
      QDRANT_VECTOR_NAME: ${QDRANT_VECTOR_NAME:-}
      QDRANT_PAYLOAD_TEXT: ${QDRANT_PAYLOAD_TEXT:-text}
      QDRANT_PAYLOAD_SOURCE: ${QDRANT_PAYLOAD_SOURCE:-source}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-keepitreal/vietnamese-sbert}
    depends_on:
      - redis
    profiles:
      - cli

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://chatbot:chatbot@host.docker.internal:5432/chatbot_db}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: ${QDRANT_URL:?Set QDRANT_URL in .env}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: ${DOCKER_OLLAMA_URL:-http://host.docker.internal:11434}
      LLM_MODEL_LIGHT: ${LLM_MODEL_LIGHT:-qwen2.5:3b}
      LLM_MODEL_HEAVY: ${LLM_MODEL_HEAVY:-qwen2.5:3b}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-30}
      LLM_ROUTER_TIMEOUT: ${LLM_ROUTER_TIMEOUT:-8}
      LLM_ANSWER_TIMEOUT: ${LLM_ANSWER_TIMEOUT:-30}
      ROUTER_RISK_OVERRIDE_CONFIDENCE: ${ROUTER_RISK_OVERRIDE_CONFIDENCE:-0.65}
      WORKER_TASKS_ENABLED: ${WORKER_TASKS_ENABLED:-false}
      REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-1}
      REDIS_SOCKET_TIMEOUT: ${REDIS_SOCKET_TIMEOUT:-1}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-10}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-5}
      RETRIEVAL_CONTEXT_MAX_TOKENS: ${RETRIEVAL_CONTEXT_MAX_TOKENS:-2200}
      RETRIEVAL_MAX_DOCUMENTS: ${RETRIEVAL_MAX_DOCUMENTS:-8}
      RETRIEVAL_MIN_RERANK_SCORE: ${RETRIEVAL_MIN_RERANK_SCORE:--0.2}
      KEYWORD_SCROLL_MAX_POINTS: ${KEYWORD_SCROLL_MAX_POINTS:-2048}

      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag}
      QDRANT_MEMORY_COLLECTION: ${QDRANT_MEMORY_COLLECTION:-chat_store}
      QDRANT_VECTOR_NAME: ${QDRANT_VECTOR_NAME:-}
      QDRANT_PAYLOAD_TEXT: ${QDRANT_PAYLOAD_TEXT:-text}
      QDRANT_PAYLOAD_SOURCE: ${QDRANT_PAYLOAD_SOURCE:-source}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-keepitreal/vietnamese-sbert}
    depends_on:
      - redis
    profiles:
      - api

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://chatbot:chatbot@host.docker.internal:5432/chatbot_db}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: ${QDRANT_URL:?Set QDRANT_URL in .env}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OLLAMA_URL: ${DOCKER_OLLAMA_URL:-http://host.docker.internal:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL_LIGHT: ${LLM_MODEL_LIGHT:-qwen2.5:3b}
      LLM_MODEL_HEAVY: ${LLM_MODEL_HEAVY:-qwen2.5:3b}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-30}
      LLM_ROUTER_TIMEOUT: ${LLM_ROUTER_TIMEOUT:-8}
      LLM_ANSWER_TIMEOUT: ${LLM_ANSWER_TIMEOUT:-30}
      ROUTER_RISK_OVERRIDE_CONFIDENCE: ${ROUTER_RISK_OVERRIDE_CONFIDENCE:-0.65}
      WORKER_TASKS_ENABLED: ${WORKER_TASKS_ENABLED:-false}
      REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-1}
      REDIS_SOCKET_TIMEOUT: ${REDIS_SOCKET_TIMEOUT:-1}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-10}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-5}
      RETRIEVAL_CONTEXT_MAX_TOKENS: ${RETRIEVAL_CONTEXT_MAX_TOKENS:-2200}
      RETRIEVAL_MAX_DOCUMENTS: ${RETRIEVAL_MAX_DOCUMENTS:-8}
      RETRIEVAL_MIN_RERANK_SCORE: ${RETRIEVAL_MIN_RERANK_SCORE:--0.2}
      KEYWORD_SCROLL_MAX_POINTS: ${KEYWORD_SCROLL_MAX_POINTS:-2048}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag}
      QDRANT_MEMORY_COLLECTION: ${QDRANT_MEMORY_COLLECTION:-chat_store}
      QDRANT_VECTOR_NAME: ${QDRANT_VECTOR_NAME:-}
      QDRANT_PAYLOAD_TEXT: ${QDRANT_PAYLOAD_TEXT:-text}
      QDRANT_PAYLOAD_SOURCE: ${QDRANT_PAYLOAD_SOURCE:-source}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-keepitreal/vietnamese-sbert}
    depends_on:
      - redis
    profiles:
      - worker

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

volumes:
  redis_data:
  ollama_data:
